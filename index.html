<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>WebOS Glass</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#2563eb;
  --bg:#07111f;
  --surface:rgba(248,250,252,.72);
  --surface-solid:#f7f9fd;
  --surface-dark:rgba(13,18,30,.82);
  --text:#101827;
  --text-inv:#f8fafc;
  --muted:#5d6678;
  --line:rgba(20,30,48,.14);
  --line-dark:rgba(255,255,255,.16);
  --shadow:0 26px 90px rgba(3,8,23,.3);
  --taskbar-h:72px;
  --radius:8px;
}
html,body{width:100%;height:100%;overflow:hidden;background:#07111f;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI Variable","Segoe UI",system-ui,sans-serif}
button,input,textarea,select{font:inherit}
button{border:0;background:transparent;color:inherit;cursor:pointer}
input,textarea,select{outline:0;color:inherit}
svg{display:block}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(80,90,110,.34);border:3px solid transparent;border-radius:999px;background-clip:padding-box}
.hidden{display:none!important}

.wallpaper{position:fixed;inset:0;overflow:hidden;background:
  radial-gradient(ellipse 70% 58% at 14% 30%,rgba(45,132,255,.9) 0%,rgba(33,111,225,.65) 30%,transparent 58%),
  radial-gradient(ellipse 72% 58% at 82% 76%,rgba(91,196,255,.82) 0%,rgba(45,135,220,.32) 31%,transparent 62%),
  radial-gradient(ellipse 64% 48% at 62% 8%,rgba(116,69,255,.35),transparent 62%),
  linear-gradient(135deg,#07111f 0%,#173a72 48%,#06101d 100%);background-size:cover;background-position:center;transition:filter .2s,background .35s}
.wallpaper:before{content:"";position:absolute;inset:-18%;z-index:1;opacity:0;pointer-events:none;transition:opacity .35s}
.wallpaper:after{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;background:
  linear-gradient(180deg,rgba(255,255,255,.035),rgba(0,0,0,.17)),
  radial-gradient(circle at 50% 120%,rgba(255,255,255,.14),transparent 42%)}
.wallpaper-video,.wallpaper-live{position:absolute;inset:0;z-index:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .45s ease;pointer-events:none}
.wallpaper-video{filter:saturate(108%) contrast(102%)}
.wallpaper.video-on .wallpaper-video{opacity:1}
.wallpaper.live-on .wallpaper-live{opacity:1}
.wallpaper.video-on:before{opacity:.78}
.wallpaper.video-on:after,.wallpaper.live-on:after{background:linear-gradient(180deg,rgba(3,7,18,.04),rgba(3,7,18,.24)),radial-gradient(circle at 50% 110%,rgba(255,255,255,.16),transparent 42%)}
.wallpaper.glass-aurora{background:linear-gradient(125deg,#0a1228 0%,#103b6d 34%,#5a6dd8 62%,#0d1835 100%)}
.wallpaper.glass-aurora:before{opacity:1;background:
  radial-gradient(ellipse 42% 36% at 18% 28%,rgba(116,211,255,.7),transparent 64%),
  radial-gradient(ellipse 48% 42% at 76% 22%,rgba(220,190,255,.62),transparent 66%),
  radial-gradient(ellipse 54% 50% at 54% 82%,rgba(45,255,190,.34),transparent 64%);
  filter:blur(14px) saturate(130%);animation:auroraDrift 18s ease-in-out infinite alternate}
.wallpaper.cosmic-flow{background:radial-gradient(circle at 28% 18%,#6d5dfc,transparent 26%),radial-gradient(circle at 72% 68%,#0cc7c7,transparent 24%),linear-gradient(135deg,#050713,#131730 58%,#03050d)}
.wallpaper.cosmic-flow:before{opacity:1;background-image:radial-gradient(circle,rgba(255,255,255,.9) 0 1px,transparent 1.4px),radial-gradient(circle,rgba(125,211,252,.6) 0 1px,transparent 1.5px);background-size:86px 86px,142px 142px;animation:starFloat 26s linear infinite}
.wallpaper.minimal-liquid{background:linear-gradient(135deg,#e9f4ff,#d6f4ef 42%,#f4e8ff)}
.wallpaper.minimal-liquid:before{opacity:1;background:radial-gradient(circle at 24% 40%,rgba(37,99,235,.34),transparent 30%),radial-gradient(circle at 78% 56%,rgba(16,185,129,.3),transparent 28%),radial-gradient(circle at 54% 18%,rgba(236,72,153,.24),transparent 24%);filter:blur(14px);animation:liquidShift 16s ease-in-out infinite alternate}
.wallpaper.midnight-calm{background:linear-gradient(135deg,#050816,#12172e 48%,#07111f)}
.wallpaper.midnight-calm:before{opacity:1;background:radial-gradient(ellipse at 50% 8%,rgba(59,130,246,.42),transparent 38%),radial-gradient(ellipse at 18% 76%,rgba(20,184,166,.18),transparent 36%);filter:blur(14px);animation:calmPulse 12s ease-in-out infinite alternate}
.wallpaper.prism-tide{background:radial-gradient(ellipse at 14% 18%,rgba(56,189,248,.78),transparent 32%),radial-gradient(ellipse at 82% 18%,rgba(244,114,182,.6),transparent 30%),radial-gradient(ellipse at 50% 92%,rgba(34,197,94,.44),transparent 36%),linear-gradient(135deg,#07111f,#202a44 54%,#0a1020)}
.wallpaper.prism-tide:before{opacity:1;background:conic-gradient(from 120deg at 50% 50%,rgba(255,255,255,.22),rgba(125,211,252,.08),rgba(251,113,133,.16),rgba(255,255,255,.2));filter:blur(10px) saturate(130%);animation:prismSpin 26s linear infinite}
.wallpaper.silk-wave{background:linear-gradient(135deg,#16213e,#0f766e 42%,#4338ca 74%,#111827)}
.wallpaper.silk-wave:before{opacity:1;background:repeating-radial-gradient(ellipse at 30% 20%,rgba(255,255,255,.2) 0 2px,transparent 3px 26px),radial-gradient(ellipse at 72% 62%,rgba(250,204,21,.2),transparent 36%);filter:blur(8px);animation:silkSlide 18s ease-in-out infinite alternate}
.wallpaper.neon-glass{background:radial-gradient(circle at 24% 24%,rgba(14,165,233,.72),transparent 26%),radial-gradient(circle at 76% 30%,rgba(236,72,153,.52),transparent 25%),radial-gradient(circle at 55% 78%,rgba(132,204,22,.42),transparent 24%),linear-gradient(135deg,#020617,#111827 60%,#030712)}
.wallpaper.neon-glass:before{opacity:1;background-image:linear-gradient(115deg,transparent 0 46%,rgba(255,255,255,.18) 50%,transparent 55%),linear-gradient(70deg,transparent 0 38%,rgba(255,255,255,.1) 42%,transparent 48%);background-size:420px 420px,560px 560px;animation:glassSheen 16s linear infinite;filter:blur(.2px)}
.wallpaper.solar-mist{background:radial-gradient(ellipse at 20% 28%,rgba(251,191,36,.68),transparent 30%),radial-gradient(ellipse at 78% 32%,rgba(45,212,191,.5),transparent 31%),radial-gradient(ellipse at 54% 78%,rgba(99,102,241,.52),transparent 35%),linear-gradient(135deg,#101827,#374151 52%,#0f172a)}
.wallpaper.solar-mist:before{opacity:1;background:linear-gradient(90deg,rgba(255,255,255,.16),transparent 26% 72%,rgba(255,255,255,.12)),radial-gradient(circle at 50% 50%,rgba(255,255,255,.15),transparent 34%);filter:blur(12px);animation:mistBreathe 14s ease-in-out infinite alternate}
@keyframes auroraDrift{from{transform:translate3d(-4%,-2%,0) rotate(-5deg) scale(1.04)}to{transform:translate3d(5%,3%,0) rotate(7deg) scale(1.12)}}
@keyframes starFloat{from{transform:translate3d(0,0,0)}to{transform:translate3d(-72px,48px,0)}}
@keyframes liquidShift{from{transform:translate3d(-5%,1%,0) scale(1)}to{transform:translate3d(5%,-2%,0) scale(1.08)}}
@keyframes calmPulse{from{opacity:.78;transform:scale(1)}to{opacity:1;transform:scale(1.05)}}
@keyframes prismSpin{from{transform:rotate(0deg) scale(1.08)}to{transform:rotate(360deg) scale(1.08)}}
@keyframes silkSlide{from{transform:translate3d(-4%,-2%,0) skewX(-4deg)}to{transform:translate3d(5%,3%,0) skewX(3deg)}}
@keyframes glassSheen{from{background-position:0 0,0 0}to{background-position:420px 0,-560px 0}}
@keyframes mistBreathe{from{opacity:.58;transform:scale(1)}to{opacity:1;transform:scale(1.08)}}

.lock,.login{position:fixed;inset:0;z-index:9000;display:grid;place-items:center;color:#fff;overflow:hidden}
.lock{cursor:pointer;transform-origin:50% 22%}
.lock:before,.login:before{content:"";position:absolute;inset:0;background:rgba(3,8,16,.18);backdrop-filter:blur(1px)}
.lock.unlocking{animation:lockLift .72s cubic-bezier(.2,.84,.2,1) forwards}
.lock-panel{position:relative;text-align:center;text-shadow:0 8px 28px rgba(0,0,0,.34);animation:lockFloat .7s cubic-bezier(.2,.84,.2,1) both}
.lock-time{font-size:92px;line-height:1;font-weight:300;letter-spacing:0}
.lock-date{font-size:20px;margin-top:12px;font-weight:400}
.lock-hint{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);font-size:13px;color:rgba(255,255,255,.76)}
.login:before{background:linear-gradient(180deg,rgba(5,10,22,.22),rgba(5,10,22,.48));backdrop-filter:blur(28px) saturate(160%)}
.login-box{position:relative;width:386px;max-width:calc(100vw - 40px);padding:34px 34px 28px;background:linear-gradient(180deg,rgba(255,255,255,.28),rgba(255,255,255,.13));border:1px solid rgba(255,255,255,.42);border-radius:8px;box-shadow:0 30px 96px rgba(0,0,0,.36),inset 0 1px 0 rgba(255,255,255,.5);backdrop-filter:blur(34px) saturate(150%)}
.login.login-enter .login-box{animation:loginRise .55s cubic-bezier(.2,.84,.2,1) both}
.login-avatar{width:88px;height:88px;margin:0 auto 15px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(226,232,240,.9));color:#111827;font-size:34px;font-weight:600;box-shadow:0 18px 42px rgba(0,0,0,.26),0 0 0 1px rgba(255,255,255,.78)}
.login-title{text-align:center;font-size:22px;font-weight:600;margin-bottom:4px}
.login-subtitle{text-align:center;font-size:13px;color:rgba(255,255,255,.74);margin-bottom:18px}
.login-tabs{display:grid;grid-template-columns:1fr 1fr;margin-bottom:13px;background:rgba(255,255,255,.16);border-radius:8px;padding:3px}
.login-tab{height:34px;border-radius:6px;color:rgba(255,255,255,.78);font-size:13px}
.login-tab.active{background:rgba(255,255,255,.9);color:#111827;box-shadow:0 8px 20px rgba(0,0,0,.14)}
.login-input{width:100%;height:42px;border:1px solid rgba(255,255,255,.44);background:rgba(255,255,255,.88);border-radius:7px;padding:0 12px;margin-bottom:10px;color:#111827}
.login-input:focus{border-color:#93c5fd;box-shadow:0 0 0 3px rgba(147,197,253,.28)}
.login-actions{display:flex;gap:8px;margin-top:6px}
.login-btn{height:40px;flex:1;border-radius:7px;background:#2563eb;color:#fff;font-weight:600;box-shadow:0 12px 28px rgba(37,99,235,.28)}
.login-btn.secondary{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.38);box-shadow:none}
.login-error{height:18px;margin-top:11px;font-size:12px;color:#fee2e2;text-align:center}
@keyframes lockFloat{from{opacity:0;transform:translateY(16px);filter:blur(10px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
@keyframes lockLift{0%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}65%{opacity:.72;transform:translateY(-8%) scale(1.025);filter:blur(3px)}100%{opacity:0;transform:translateY(-16%) scale(1.06);filter:blur(18px)}}
@keyframes loginRise{from{opacity:0;transform:translateY(42px) scale(.965);filter:blur(12px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}

.welcome{position:fixed;inset:0;z-index:9200;display:grid;place-items:center;color:#fff;pointer-events:none;opacity:1;transform:scale(1);transition:opacity .9s ease,transform .9s ease}
.welcome:before{content:"";position:absolute;inset:0;background:rgba(248,250,252,.08);backdrop-filter:blur(30px) saturate(178%);box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
.welcome:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 46%,rgba(255,255,255,.28),transparent 18%),linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.02) 44%,rgba(0,0,0,.14));mix-blend-mode:screen}
.welcome.welcome-out{opacity:0;transform:scale(1.035)}
.welcome-copy{position:relative;z-index:1;max-width:calc(100vw - 32px);padding:0 16px;text-align:center;text-shadow:0 24px 62px rgba(0,0,0,.36),0 2px 10px rgba(0,0,0,.28)}
.welcome-copy:before{content:"";position:absolute;left:50%;top:50%;z-index:-1;width:min(560px,78vw);aspect-ratio:1;transform:translate(-50%,-50%) scale(.86);border-radius:999px;background:radial-gradient(circle,rgba(255,255,255,.34),rgba(96,165,250,.22) 36%,rgba(168,85,247,.18) 55%,transparent 72%);filter:blur(14px);animation:welcomeAura 2.4s ease-in-out infinite alternate}
.welcome-line{display:inline-block;font-family:"Segoe Script","Snell Roundhand","Brush Script MT",cursive;font-size:clamp(50px,9vw,132px);font-weight:400;line-height:1.05;overflow-wrap:anywhere;animation:welcomeFloat 1.7s cubic-bezier(.22,1,.36,1) both}
.welcome-cursor{display:inline-block;width:.08em;min-width:4px;height:.8em;margin-left:.09em;border-radius:999px;background:rgba(255,255,255,.92);vertical-align:-.08em;animation:welcomeBlink .85s steps(1,end) infinite;box-shadow:0 0 20px rgba(255,255,255,.56)}
@keyframes welcomeBlink{50%{opacity:0}}
@keyframes welcomeAura{from{opacity:.58;transform:translate(-50%,-50%) scale(.84)}to{opacity:1;transform:translate(-50%,-50%) scale(1.08)}}
@keyframes welcomeFloat{from{opacity:0;transform:translateY(14px) scale(.98);filter:blur(10px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}

.desktop{position:fixed;inset:0 0 var(--taskbar-h) 0;z-index:5;overflow:hidden;padding:16px}
.desktop-icons{display:flex;flex-direction:column;flex-wrap:wrap;gap:8px;height:100%;width:92px;align-content:flex-start}
.desk-icon{width:84px;height:84px;border:1px solid transparent;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.78);transition:background .16s,transform .16s,border-color .16s}
.desk-icon:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.28);transform:translateY(-1px)}
.desk-icon .app-ico{width:34px;height:34px}
.desk-label{font-size:11px;line-height:1.2;text-align:center;max-width:72px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

.taskbar{position:fixed;left:14px;right:14px;bottom:10px;height:58px;z-index:5000;display:grid;grid-template-columns:minmax(92px,max-content) minmax(0,1fr) max-content;align-items:center;gap:8px;padding:0 12px;background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(238,244,255,.46));border:1px solid rgba(255,255,255,.68);border-radius:18px;backdrop-filter:blur(18px) saturate(155%);box-shadow:0 14px 44px rgba(3,8,23,.22),inset 0 1px 0 rgba(255,255,255,.58)}
.tb-left,.tb-right,.tb-center{display:flex;align-items:center;gap:4px;min-width:0}
.tb-center{justify-content:center;overflow:hidden;padding:6px;border-radius:16px}
.tb-btn,.start-btn,.clock-zone{height:44px;border-radius:12px;display:grid;place-items:center;position:relative}
.tb-btn,.start-btn{width:48px}
.tb-btn,.start-btn{transition:transform .18s ease,background .18s ease,box-shadow .18s ease}
.tb-btn:hover,.start-btn:hover,.clock-zone:hover,.search-box:hover{background:rgba(255,255,255,.62);box-shadow:0 14px 34px rgba(15,23,42,.16)}
.tb-btn:hover,.start-btn:hover{transform:translateY(-7px) scale(1.08)}
.start-btn.open,.tb-btn.active{background:rgba(255,255,255,.74)}
.tb-btn.running:after,.tb-btn.active:after{content:"";position:absolute;bottom:2px;left:50%;transform:translateX(-50%);height:3px;border-radius:4px;background:#64748b}
.tb-btn.running:after{width:6px}
.tb-btn.active:after{width:18px;background:var(--accent)}
.tb-tip{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);white-space:nowrap;background:#20242d;color:#fff;border:1px solid rgba(255,255,255,.08);padding:5px 9px;border-radius:4px;font-size:11px;opacity:0;pointer-events:none;transition:.12s;box-shadow:0 8px 24px rgba(0,0,0,.28)}
.tb-btn:hover .tb-tip{opacity:1}
.search-box{height:38px;width:220px;border-radius:999px;background:rgba(255,255,255,.72);border:1px solid rgba(0,0,0,.06);display:flex;align-items:center;gap:8px;padding:0 12px;color:#4b5563;font-size:13px}
.taskbar.compact .search-box{width:44px;justify-content:center;padding:0}
.taskbar.compact .search-box span{display:none}
.taskbar.compact .tb-btn,.taskbar.compact .start-btn{width:42px}
.taskbar.dense .tb-btn,.taskbar.dense .start-btn{width:36px;height:40px;border-radius:10px}
.taskbar.dense .tb-center{gap:3px}
.taskbar.dense .tb-btn svg,.taskbar.dense .start-btn svg{width:19px;height:19px}
.taskbar.ultra .tb-btn,.taskbar.ultra .start-btn{width:30px;height:38px;border-radius:9px}
.taskbar.ultra .tb-center{gap:2px;padding-inline:4px}
.taskbar.ultra .tb-btn svg,.taskbar.ultra .start-btn svg{width:17px;height:17px}
.taskbar.ultra .tray{gap:5px;padding-inline:6px}
.taskbar.ultra .battery-text{display:none}
.tray{height:40px;border-radius:5px;display:flex;align-items:center;gap:8px;padding:0 8px;font-size:12px;color:#182033}
.battery-text{font-size:12px;min-width:34px;text-align:right;color:#172033}
.tray:hover{background:rgba(0,0,0,.07)}
.clock-zone{min-width:86px;align-items:end;justify-items:end;padding:0 7px;color:#172033}
.clock-time{font-size:12px;line-height:1.25}
.clock-date{font-size:11px;line-height:1.25}
.sync{width:8px;height:8px;border-radius:50%;background:#9ca3af;margin-right:4px}
.sync.synced{background:#22c55e}.sync.saving{background:#eab308}.sync.error{background:#ef4444}

.start-menu,.search-panel,.calendar-pop{position:fixed;z-index:6100;background:rgba(246,248,252,.92);border:1px solid rgba(255,255,255,.72);border-radius:8px;box-shadow:0 20px 55px rgba(0,0,0,.22);backdrop-filter:blur(30px) saturate(170%);color:#101827;opacity:0;pointer-events:none;transform:translateY(10px);transition:opacity .14s,transform .14s}
.start-menu.open,.search-panel.open,.calendar-pop.open{opacity:1;pointer-events:auto;transform:translateY(0)}
.start-menu{left:50%;bottom:58px;width:min(640px,calc(100vw - 24px));margin-left:-320px;padding:20px}
.start-search{height:36px;width:100%;border:1px solid #cbd5e1;border-radius:4px;background:#fff;padding:0 12px;margin-bottom:18px}
.start-sec{font-size:13px;font-weight:600;margin-bottom:10px}
.start-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.start-app{height:76px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px}
.start-app:hover{background:rgba(15,23,42,.07)}
.start-app .app-ico{width:30px;height:30px}
.start-app-name{font-size:11px;max-width:84px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.start-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(15,23,42,.1);margin-top:18px;padding-top:12px}
.user-chip{display:flex;align-items:center;gap:10px;font-size:13px}
.avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#dbeafe;color:#1e3a8a;font-weight:600}
.power-btn{width:34px;height:34px;border-radius:5px}
.power-btn:hover{background:rgba(239,68,68,.13);color:#dc2626}
.calendar-pop{right:10px;bottom:58px;width:330px;padding:14px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-title{font-weight:600}
.cal-nav button{width:28px;height:28px;border-radius:4px}
.cal-nav button:hover{background:rgba(15,23,42,.08)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{height:28px;display:grid;place-items:center;font-size:11px;color:#64748b}
.cal-day{height:34px;border-radius:50%;display:grid;place-items:center;font-size:12px}
.cal-day:hover{background:rgba(15,23,42,.08)}
.cal-day.today{background:var(--accent);color:#fff;font-weight:600}
.cal-day.has{box-shadow:0 0 0 1px var(--accent) inset}

.window{position:fixed;z-index:20;min-width:286px;min-height:170px;background:rgba(249,250,252,.78);border:1px solid rgba(255,255,255,.64);border-radius:16px;box-shadow:0 22px 72px rgba(3,8,23,.28);overflow:hidden;display:flex;flex-direction:column;color:#101827;backdrop-filter:blur(18px) saturate(145%);animation:winIn .22s cubic-bezier(.2,.8,.2,1)}
.window.focused{box-shadow:0 34px 110px rgba(0,0,0,.36);border-color:rgba(255,255,255,.84);transform:translateY(-1px)}
.window.maximized{border-radius:0;border-left:0;border-right:0;border-top:0;animation:none}
.titlebar{height:38px;display:flex;align-items:center;gap:9px;padding:0 10px;background:linear-gradient(180deg,rgba(255,255,255,.7),rgba(244,248,255,.52));border-bottom:1px solid rgba(255,255,255,.58);user-select:none;backdrop-filter:blur(12px);touch-action:none}
@keyframes winIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
.titlebar.drag{cursor:move}
.win-ico{width:16px;height:16px;flex:0 0 auto;margin-left:2px}
.win-title{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.win-controls{display:flex;height:32px;margin-right:-10px}
.win-control{width:46px;height:32px;border-radius:0;display:grid;place-items:center;color:#111827}
.win-control svg{opacity:.82}
.win-control:hover{background:rgba(0,0,0,.08)}

function saveJsonStore(key,value){localStorage.setItem(key,JSON.stringify(value))}
async function localHash(text){
  const data=new TextEncoder().encode(text);
  const hash=await crypto.subtle.digest("SHA-256",data);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function localToken(){return"winos_"+Math.random().toString(36).slice(2)+Date.now().toString(36)}
function localJson(data,status=200){return new Response(JSON.stringify(data),{status,headers:{"Content-Type":"application/json"}})}
function localAuthHeader(opts={}){
  const h=opts.headers||{};
  if(h instanceof Headers)return h.get("Authorization")||"";
  return h.Authorization||h.authorization||"";
}
function localUserFromAuth(opts={}){
  const raw=localAuthHeader(opts).replace(/^Bearer\s+/i,"").trim();
  if(!raw)return null;
  const accounts=jsonStore(LS_ACCOUNTS,{});
  return Object.entries(accounts).find(([,a])=>a.token===raw)?.[0]||null;
}
async function localApi(path,opts={}){
  const url=new URL(path,location.origin),method=(opts.method||"GET").toUpperCase();
  const body=opts.body?JSON.parse(opts.body):{};
  if(url.pathname==="/auth/register"&&method==="POST"){
    const username=String(body.username||"").trim(),password=String(body.password||"").trim();
    if(username.length<3)return localJson({detail:"Username must be at least 3 characters"},400);
    if(password.length<4)return localJson({detail:"Password must be at least 4 characters"},400);
    const accounts=jsonStore(LS_ACCOUNTS,{});
    if(accounts[username])return localJson({detail:"Username already taken"},409);
    accounts[username]={passwordHash:await localHash(password),token:localToken()};
    saveJsonStore(LS_ACCOUNTS,accounts);
    return localJson({token:accounts[username].token,username});
  }
  if(url.pathname==="/auth/login"&&method==="POST"){
    const username=String(body.username||"").trim(),password=String(body.password||"").trim(),accounts=jsonStore(LS_ACCOUNTS,{});
    if(!accounts[username]||accounts[username].passwordHash!==await localHash(password))return localJson({detail:"Wrong username or password"},401);
    return localJson({token:accounts[username].token,username});
  }
  if(url.pathname==="/auth/me"){
    const username=localUserFromAuth(opts);
    return username?localJson({id:username,username}):localJson({detail:"Invalid or expired token"},401);
  }
  if(url.pathname==="/desktop/state"){
    const username=localUserFromAuth(opts);
    if(!username)return localJson({detail:"Not authenticated"},401);
    const states=jsonStore(LS_SERVER_STATES,{});
    if(method==="GET")return localJson({state:states[username]||{},is_default:!states[username],updated_at:null});
    states[username]=body.state||body||{};
    saveJsonStore(LS_SERVER_STATES,states);
    return localJson({ok:true,bytes:JSON.stringify(states[username]).length});
  }
  return null;
}
const nativeFetch=window.fetch.bind(window);
window.fetch=async(input,opts={})=>{
  const url=typeof input==="string"?input:input.url,parsed=new URL(url,location.href);
  if(parsed.origin===location.origin){
    const handled=await localApi(parsed.pathname+parsed.search,opts);
    if(handled)return handled;
  }
  return nativeFetch(input,opts);
};

  }
  if(video){
    if(picked&&picked.video&&matchMedia("(prefers-reduced-motion: no-preference)").matches){
      video.muted=true;video.loop=true;video.autoplay=true;video.playsInline=true;

      if(video.getAttribute("src")!==picked.video){video.setAttribute("src",picked.video);video.load()}
      video.oncanplay=()=>resumeWallpaperVideo();
      resumeWallpaperVideo();
    }else{

      video.style.filter="";

  }

function resumeWallpaperVideo(){
  const video=document.getElementById("wallpaperVideo"),picked=wallpaperChoices.find(w=>w.id===state.wallpaper);
  if(!video||!picked||!picked.video||!matchMedia("(prefers-reduced-motion: no-preference)").matches)return;

function startLiveWallpaper(mode){
  if(liveWallpaperMode===mode&&liveWallpaperFrame)return;
  stopLiveWallpaper();
  liveWallpaperMode=mode;
  liveWallpaperFrame=requestAnimationFrame(drawLiveWallpaper);
}
function stopLiveWallpaper(){
  if(liveWallpaperFrame)cancelAnimationFrame(liveWallpaperFrame);
  liveWallpaperFrame=0;liveWallpaperMode="";liveWallpaperLast=0;
}
function drawLiveWallpaper(t){
  const c=document.getElementById("wallpaperLive");if(!c||!liveWallpaperMode)return;
  if(t-liveWallpaperLast<33){liveWallpaperFrame=requestAnimationFrame(drawLiveWallpaper);return}
  liveWallpaperLast=t;
  const dpr=Math.min(devicePixelRatio||1,1.25),w=Math.max(640,Math.floor(innerWidth*dpr)),h=Math.max(420,Math.floor(innerHeight*dpr));
  if(c.width!==w||c.height!==h){c.width=w;c.height=h}
  const ctx=c.getContext("2d"),time=t*.00018;
  const bg=ctx.createLinearGradient(0,0,w,h);
  if(liveWallpaperMode==="bloom"){bg.addColorStop(0,"#e9f4ff");bg.addColorStop(.52,"#d7f7ef");bg.addColorStop(1,"#f3e8ff")}
  else{bg.addColorStop(0,"#020617");bg.addColorStop(.5,liveWallpaperMode==="ribbons"?"#312e81":"#064e3b");bg.addColorStop(1,"#0f172a")}
  ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
  const palette=liveWallpaperMode==="bloom"?["rgba(56,189,248,.34)","rgba(244,114,182,.26)","rgba(34,197,94,.22)"]:["rgba(45,212,191,.42)","rgba(129,140,248,.34)","rgba(244,114,182,.22)","rgba(250,204,21,.16)"];
  for(let i=0;i<7;i++){
    const x=(Math.sin(time*(1.2+i*.19)+i)*.42+.5)*w;
    const y=(Math.cos(time*(1.05+i*.13)+i*1.7)*.38+.5)*h;
    const r=(.18+((i%3)*.055))*Math.max(w,h);
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,palette[i%palette.length]);g.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  }
  if(liveWallpaperMode==="ribbons"){
    ctx.globalAlpha=.55;ctx.lineWidth=Math.max(18,w*.018);ctx.lineCap="round";
    for(let i=0;i<5;i++){ctx.strokeStyle=palette[i%palette.length];ctx.beginPath();for(let x=-80;x<w+80;x+=80){const y=h*(.22+i*.14)+Math.sin(x*.008+time*10+i)*h*.06;ctx[i?"lineTo":"moveTo"](x,y)}ctx.stroke()}
    ctx.globalAlpha=1;
  }
  liveWallpaperFrame=requestAnimationFrame(drawLiveWallpaper);
}

function extOf(name){const m=String(name||"").match(/(\.[a-z0-9]+)$/i);return m?m[1].toLowerCase():""}
function fileIcon(name,file=null){const ext=extOf(name);return file&&file.kind==="image"?icon("image",34):[".png",".jpg",".jpeg",".webp",".gif"].includes(ext)?icon("image",34):icon("file",34)}
function findFile(id){for(const folder of folders){const f=(state.vfs[folder]||[]).find(x=>x.id===id);if(f)return{folder,file:f}}return null}
function isImageFile(file){return !!file&&(file.kind==="image"||[".png",".jpg",".jpeg",".webp",".gif"].includes(extOf(file.name)))}
function openFile(id){const found=findFile(id);if(!found)return;openApp(isImageFile(found.file)?"viewer":"notepad",{fileId:id})}
function normalizeFileName(name,defaultExt=".txt"){
  let clean=String(name||"").trim().replace(/[\\/:*?"<>|]/g,"-").replace(/\s+/g," ");
  clean=clean.replace(/^\.+/,"").slice(0,80);
  if(!clean)return"";
  if(!/\.[a-z0-9]+$/i.test(clean))clean+=defaultExt;
  return clean;
}
function uniqueFileName(folder,name){
  const list=state.vfs[folder]||[],ext=extOf(name),base=ext?name.slice(0,-ext.length):name;
  let candidate=name,n=2;
  while(list.some(f=>f.name.toLowerCase()===candidate.toLowerCase()))candidate=`${base} ${n++}${ext}`;
  return candidate;
}
function createFile(folder,name,content=""){
  const clean=normalizeFileName(name);
  if(!clean)throw new Error("Please enter a file name.");
  const finalName=uniqueFileName(folder,clean),ext=extOf(finalName);
  const f=fileObj(finalName,content || fileTemplates[ext] || "");
  state.vfs[folder]=[...(state.vfs[folder]||[]),f];saveState();return f;
}
function createImageFile(folder,name,dataUrl){
  const clean=normalizeFileName(name,".png");
  if(!clean)throw new Error("Please enter a file name.");

  state.vfs[folder]=[...(state.vfs[folder]||[]),f];saveState();return f;
}
function updateFile(id,patch){const found=findFile(id);if(!found)return;state.vfs[found.folder]=state.vfs[found.folder].map(f=>f.id===id?{...f,...patch,updatedAt:iso()}:f);saveState()}
function deleteFile(id){const found=findFile(id);if(!found)return;state.vfs[found.folder]=state.vfs[found.folder].filter(f=>f.id!==id);saveState();renderAll()}
function termData(w){if(w.data.cwd==null)w.data.cwd="Documents";if(!Array.isArray(w.data.history))w.data.history=[{kind:"dim",text:"Infinix Terminal. Type help to see commands."}];return w.data}
function termPath(cwd){return cwd?`/${cwd}`:"/"}
function termPrompt(w){return `infinix:${termPath(termData(w).cwd)}$`}
function termPrint(w,text,kind="out"){const d=termData(w),lines=String(text??"").split(/\r?\n/);lines.forEach(line=>d.history.push({kind,text:line}));if(d.history.length>180)d.history=d.history.slice(-180)}
function termLine(line){const kind=escapeHtml(line.kind||"out");if(line.kind==="cmd")return`<div class="term-line cmd"><span class="term-prompt">${escapeHtml(line.prompt||"$")}</span>${escapeHtml(line.text)}</div>`;return`<div class="term-line ${kind}">${escapeHtml(line.text)}</div>`}
function tokenizeCommand(input){const out=[];let cur="",quote="";for(const ch of String(input||"")){if(quote){if(ch===quote){quote=""}else cur+=ch}else if(ch==="\""||ch==="'"){quote=ch}else if(/\s/.test(ch)){if(cur){out.push(cur);cur=""}}else cur+=ch}if(cur)out.push(cur);return out}
function matchFolder(name){return folders.find(f=>f.toLowerCase()===String(name||"").toLowerCase())||null}
function resolveTermFolder(cwd,path=""){let raw=String(path||"").trim().replace(/\\/g,"/");if(!raw||raw==="."||raw==="~")return cwd;if(raw==="/"||raw===".."||raw==="/..")return"";raw=raw.replace(/^\/+/,"").replace(/\/+$/,"");const parts=raw.split("/").filter(Boolean);if(parts.length===1)return matchFolder(parts[0]);if(parts.length===2&&parts[0]==="..")return matchFolder(parts[1]);return null}
function resolveTermFile(cwd,path){
  let raw=String(path||"").trim().replace(/\\/g,"/");if(!raw)return{error:"Missing file name."};
  let folder=cwd,name=raw.replace(/^\.\/+/,"");
  if(raw.startsWith("/")){
    const parts=raw.split("/").filter(Boolean);folder=matchFolder(parts.shift());name=parts.join("/");
  }else{
    const parts=name.split("/").filter(Boolean);
    if(parts[0]===".."){folder="";parts.shift()}
    const first=matchFolder(parts[0]);
    if(first&&parts.length>1){folder=first;parts.shift()}
    name=parts.join("/")||name;
  }
  if(!folder){
    const hits=[];folders.forEach(f=>(state.vfs[f]||[]).forEach(file=>{if(file.name.toLowerCase()===name.toLowerCase())hits.push({folder:f,file})}));
    if(hits.length===1)return hits[0];
    return{error:hits.length>1?`${name}: found in multiple folders. Use /Folder/${name}`:`${name}: no such file.`};
  }
  const file=(state.vfs[folder]||[]).find(f=>f.name.toLowerCase()===name.toLowerCase());
  return file?{folder,file}:{error:`${name}: no such file in ${folder}.`};
}
function terminalHelp(){return["Commands:","  ls [folder]       list folders or files","  cd <folder|..|/> move between WebOS folders","  pwd               show current folder","  cat <file>        print a file","  touch <file>      create a file in the current folder","  open <file>       open a file in its app","  run <file>        execute .js or preview .html files","  clear             clear this terminal"].join("\n")}
function runTerminalFile(w,file){
  const ext=extOf(file.name);
  if(ext===".js"){termPrint(w,`Running ${file.name}...`,"dim");runJsTerminalFile(w.id,file);return}
  if(ext===".html"){openApp("runner",{title:file.name,type:"html",content:file.content});termPrint(w,`Opened ${file.name} in Runner.`,"dim");return}
  if(ext===".json"){try{termPrint(w,JSON.stringify(JSON.parse(file.content||"null"),null,2));}catch{termPrint(w,file.content||"(empty)")}return}
  if([".txt",".md",".css"].includes(ext)){termPrint(w,file.content||"(empty)");return}
  if(ext===".py"){termPrint(w,"Python files are saved in WebOS, but this browser runtime can execute JavaScript and preview HTML files.","err");return}
  if(isImageFile(file)){openFile(file.id);termPrint(w,`Opened ${file.name}.`,"dim");return}
  termPrint(w,`${file.name}: no runner for ${ext||"this file type"}.`,"err");
}
function appendTerminalById(id,text,kind="out"){const w=state.windows.find(x=>x.id===id);if(!w)return;termPrint(w,text,kind);saveStateQuiet();renderAll()}
function runJsTerminalFile(id,file){
  const format="const format=v=>{try{if(typeof v==='string')return v;const j=JSON.stringify(v,null,2);return j===undefined?String(v):j}catch{return String(v)}};";
  const bridge="const send=(kind,args)=>postMessage({kind,text:Array.from(args).map(format).join(' ')});self.console={log:(...a)=>send('out',a),info:(...a)=>send('out',a),warn:(...a)=>send('dim',a),error:(...a)=>send('err',a)};";
  const source=`${format}${bridge}\nPromise.resolve((async()=>{\n${file.content||""}\n})()).then(value=>{if(value!==undefined)console.log(value);postMessage({kind:'done'})}).catch(error=>postMessage({kind:'err',text:error&&error.stack?error.stack:String(error)}));`;
  const url=URL.createObjectURL(new Blob([source],{type:"text/javascript"}));let done=false;
  try{
    const worker=new Worker(url),timer=setTimeout(()=>{if(done)return;done=true;worker.terminate();URL.revokeObjectURL(url);appendTerminalById(id,`${file.name}: stopped after 3s timeout.`,"err")},3000);
    worker.onmessage=e=>{const msg=e.data||{};if(msg.kind==="done"){if(done)return;done=true;clearTimeout(timer);worker.terminate();URL.revokeObjectURL(url);appendTerminalById(id,"Process exited with code 0.","dim")}else appendTerminalById(id,msg.text||"",msg.kind||"out")};
    worker.onerror=e=>{if(done)return;done=true;clearTimeout(timer);worker.terminate();URL.revokeObjectURL(url);appendTerminalById(id,e.message||"JavaScript runtime error.","err")};
  }catch(e){URL.revokeObjectURL(url);appendTerminalById(id,e.message||"Could not start JavaScript runner.","err")}
}
function executeTerminal(w,raw){
  const parts=tokenizeCommand(raw),cmd=(parts.shift()||"").toLowerCase(),arg=parts.join(" "),d=termData(w);
  if(!cmd)return;
  if(cmd==="help"){termPrint(w,terminalHelp(),"dim");return}
  if(cmd==="clear"){d.history=[];return}
  if(cmd==="pwd"){termPrint(w,termPath(d.cwd));return}
  if(cmd==="ls"){
    const folder=resolveTermFolder(d.cwd,arg);
    if(folder===null){termPrint(w,`${arg}: no such folder.`,"err");return}
    if(!folder){termPrint(w,folders.map(f=>f+"/").join("  "));return}
    const files=state.vfs[folder]||[];termPrint(w,files.length?files.map(f=>f.name).join("\n"):"(empty)");return
  }
  if(cmd==="cd"){const folder=resolveTermFolder(d.cwd,arg||"/");if(folder===null)termPrint(w,`${arg}: no such folder.`,"err");else d.cwd=folder;return}
  if(cmd==="touch"){if(!d.cwd){termPrint(w,"Choose a folder first with cd Documents, cd Desktop, etc.","err");return}try{const f=createFile(d.cwd,arg||"untitled.txt");termPrint(w,`Created ${f.name}.`,"dim")}catch(e){termPrint(w,e.message,"err")}return}
  if(["cat","open","run"].includes(cmd)){
    const found=resolveTermFile(d.cwd,arg);if(found.error){termPrint(w,found.error,"err");return}
    if(cmd==="cat"){termPrint(w,found.file.content||"(empty)");return}
    if(cmd==="open"){openFile(found.file.id);termPrint(w,`Opened ${found.file.name}.`,"dim");return}
    runTerminalFile(w,found.file);return
  }
  const maybe=resolveTermFile(d.cwd,raw.replace(/^\.\//,""));
  if(!maybe.error){runTerminalFile(w,maybe.file);return}
  termPrint(w,`${cmd}: command not found. Type help.`,"err");
}
function runTerminalCommand(id,root){const w=state.windows.find(x=>x.id===id);if(!w)return;const input=root.querySelector(`[data-term-input="${id}"]`),raw=(input?.value||w.data.command||"").trim();termData(w);if(!raw)return;w.data.history.push({kind:"cmd",prompt:termPrompt(w),text:raw});w.data.command="";executeTerminal(w,raw);saveState();renderAll()}

function winningLine(board){return[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].find(line=>line.every(i=>board[i]&&board[i]===board[line[0]]))}
function finishTttIfNeeded(g){const win=winningLine(g.board);if(win){const who=g.board[win[0]];g.status=`${who} wins`;g.scores[who.toLowerCase()]++;return true}if(g.board.every(Boolean)){g.status="Draw";g.scores.draw++;return true}return false}
function bestTttMove(board){const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]],pick=mark=>{for(const l of lines){const vals=l.map(i=>board[i]);if(vals.filter(v=>v===mark).length===2&&vals.includes(""))return l[vals.indexOf("")]}return null};return pick("O")??pick("X")??[4,0,2,6,8,1,3,5,7].find(i=>!board[i])}
function playTtt(i){const g=getTtt();if(g.board[i]||winningLine(g.board)||g.board.every(Boolean))return;g.board[i]=g.turn;if(finishTttIfNeeded(g)){saveState();renderAll();return}if(g.mode==="ai"&&g.turn==="X"){g.turn="O";const ai=bestTttMove(g.board);if(ai!=null)g.board[ai]="O";finishTttIfNeeded(g);g.turn="X";if(!winningLine(g.board)&&!g.board.every(Boolean))g.status="Your move"}else{g.turn=g.turn==="X"?"O":"X";g.status=`${g.turn}'s turn`}saveState();renderAll()}
function snakeFresh(){return{size:14,snake:[{x:6,y:7},{x:5,y:7},{x:4,y:7}],dir:{x:1,y:0},next:{x:1,y:0},food:{x:10,y:7},score:0,best:state.games?.snake?.best||0,running:false,status:"Press Start"}}
function getSnake(){state.games=state.games||{};if(!state.games.snake)state.games.snake=snakeFresh();return state.games.snake}
function snakeKey(p){return p.x+","+p.y}
function placeSnakeFood(g){const used=new Set(g.snake.map(snakeKey));let p;do{p={x:Math.floor(Math.random()*g.size),y:Math.floor(Math.random()*g.size)}}while(used.has(snakeKey(p)));g.food=p}
function resetSnake(){state.games.snake=snakeFresh();placeSnakeFood(state.games.snake);saveState();renderAll()}
function setSnakeDir(x,y){const g=getSnake();if(g.dir.x+x===0&&g.dir.y+y===0)return;g.next={x,y};g.status=g.running?"Running":"Ready";saveStateQuiet();renderSnakeDom()}
function renderSnakeDom(){const g=getSnake(),board=document.querySelector(".window.focused .snake-board"),meta=document.getElementById("snakeMeta");if(meta)meta.textContent=`Score ${g.score} / Best ${g.best} / ${g.status}`;if(!board)return;const used=new Set(g.snake.map(snakeKey));[...board.children].forEach((cell,i)=>{const p={x:i%g.size,y:Math.floor(i/g.size)};cell.className="snake-cell"+(used.has(snakeKey(p))?" snake":(p.x===g.food.x&&p.y===g.food.y?" food":""))})}
function stepSnake(){const win=state.windows.find(w=>w.app==="snake");if(!win||win.minimized||!win.focused)return;const g=getSnake();if(!g.running)return;g.dir=g.next;const head=g.snake[0],next={x:(head.x+g.dir.x+g.size)%g.size,y:(head.y+g.dir.y+g.size)%g.size};if(g.snake.some(p=>p.x===next.x&&p.y===next.y)){g.running=false;g.status="Game over";g.best=Math.max(g.best,g.score);saveState();renderAll();return}g.snake.unshift(next);if(next.x===g.food.x&&next.y===g.food.y){g.score+=10;g.best=Math.max(g.best,g.score);placeSnakeFood(g)}else g.snake.pop();saveStateQuiet();renderSnakeDom()}
function snakeApp(){const g=getSnake(),used=new Set(g.snake.map(snakeKey));return`<div class="app-shell"><div class="toolbar"><button class="tool-btn primary" data-snake-start>${g.running?"Pause":"Start"}</button><button class="tool-btn" data-snake-reset>New</button><span class="muted" id="snakeMeta">Score ${g.score} / Best ${g.best} / ${escapeHtml(g.status)}</span></div><main class="main-pane"><div class="snake-board">${Array.from({length:g.size*g.size},(_,i)=>{const p={x:i%g.size,y:Math.floor(i/g.size)},cls=used.has(snakeKey(p))?" snake":(p.x===g.food.x&&p.y===g.food.y?" food":"");return`<span class="snake-cell${cls}"></span>`}).join("")}</div><div class="dpad"><span></span><button data-snake-dir="0:-1">Up</button><span></span><button data-snake-dir="-1:0">Left</button><button data-snake-dir="0:1">Down</button><button data-snake-dir="1:0">Right</button></div></main></div>`}
function loadPeer(){return new Promise((resolve,reject)=>{if(window.Peer)return resolve(window.Peer);const s=document.createElement("script");s.src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js";s.onload=()=>resolve(window.Peer);s.onerror=()=>reject(new Error("Could not load phone camera bridge."));document.head.appendChild(s)})}
function attachCameraStreams(){const v=document.getElementById("cameraVideo");if(!v)return;const stream=phoneStream||cameraStream;if(stream&&v.srcObject!==stream)v.srcObject=stream}
async function startLocalCamera(){
  try{
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)throw new Error("Camera needs HTTPS, localhost, and a supported browser.");
    stopCamera(false);
    state.camera.status="Requesting camera permission...";
    state.camera.details="Choose Allow in the browser permission prompt.";
    saveState();renderAll();
    cameraStream=await Promise.race([
      navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:"user"},audio:false}),
      timeout(5000,"Camera permission timed out. Check browser permission and device access.")
    ]);
    const track=cameraStream.getVideoTracks()[0],settings=track?.getSettings?.()||{};
    state.camera.status="Local camera connected.";
    state.camera.details=settings.width?`${settings.width}x${settings.height||""} ${settings.frameRate?Math.round(settings.frameRate)+" fps":""}`:"Live preview active.";
    saveState();renderAll();
  }catch(e){
    state.camera.status="Camera not connected.";
    state.camera.details=e.message||"Permission denied or camera unavailable.";
    saveState();renderAll();
  }
}
async function startPhoneCamera(){try{const Peer=await loadPeer();if(cameraPeer)cameraPeer.destroy();cameraPeer=new Peer();state.camera.status="Preparing phone camera link...";saveState();renderAll();cameraPeer.on("open",id=>{cameraPeerId=id;state.camera.phoneUrl=`${location.origin}${location.pathname}?phoneCamera=${encodeURIComponent(id)}`;state.camera.status="Scan the QR code with your phone.";saveState();renderAll()});cameraPeer.on("call",call=>{call.answer();call.on("stream",stream=>{phoneStream=stream;state.camera.status="Phone camera connected.";saveState();renderAll()})});cameraPeer.on("error",err=>{state.camera.status=err.message||"Phone camera bridge failed.";saveState();renderAll()})}catch(e){state.camera.status=e.message;saveState();renderAll()}}
function captureCamera(){const v=document.getElementById("cameraVideo");if(!v||!v.videoWidth){state.camera.status="No camera frame available yet.";saveState();renderAll();return}const canvas=document.createElement("canvas");canvas.width=v.videoWidth;canvas.height=v.videoHeight;const ctx=canvas.getContext("2d");if(state.camera.mirror){ctx.translate(canvas.width,0);ctx.scale(-1,1)}ctx.drawImage(v,0,0);const dataUrl=canvas.toDataURL("image/png"),stamp=new Date().toISOString().replace(/[:.]/g,"-").slice(0,23),file=createImageFile("Pictures",`Snapshot ${stamp}.png`,dataUrl);state.camera.photo=dataUrl;state.camera.status=`Snapshot saved to Pictures as ${file.name}.`;state.camera.details="Open File Explorer > Pictures to view the snapshot.";saveState();renderAll()}
function stopCamera(render=true){[cameraStream,phoneStream].forEach(stream=>stream&&stream.getTracks().forEach(t=>t.stop()));cameraStream=null;phoneStream=null;if(cameraPeer){cameraPeer.destroy();cameraPeer=null}state.camera.status="Camera stopped.";state.camera.details="";if(render){saveState();renderAll()}}
async function renderPhoneCameraPortal(targetId){document.body.innerHTML=`<main class="phone-portal"><section class="phone-card"><h1>WebOS Glass Phone Camera</h1><p id="phoneStatus">Allow camera access to stream to WebOS Glass.</p><video id="phoneVideo" autoplay playsinline muted></video><button class="login-btn" id="phoneStart">Start Phone Camera</button></section></main>`;document.getElementById("phoneStart").addEventListener("click",async()=>{const status=document.getElementById("phoneStatus");try{const Peer=await loadPeer(),stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});document.getElementById("phoneVideo").srcObject=stream;const peer=new Peer();peer.on("open",()=>{peer.call(targetId,stream);status.textContent="Streaming to WebOS Glass. Keep this page open."});peer.on("error",e=>status.textContent=e.message||"Connection failed.")}catch(e){status.textContent=e.message||"Camera failed."}})}
function createExplorerFile(id){
  const w=state.windows.find(x=>x.id===id);if(!w)return;
  const input=document.getElementById("new_"+w.id),folder=w.data.folder||"Documents";
  try{
    const f=createFile(folder,input.value);
    w.data.newName="";
    w.data.fileError="";
    openApp("notepad",{fileId:f.id});
  }catch(e){
    w.data.fileError=e.message||"Could not create file.";
  }
  saveState();renderAll();
}

async function goChromium(id,root){
  const w=state.windows.find(x=>x.id===id),tab=tabDefaults(w),input=root.querySelector(`[data-url="${id}"]`),raw=input.value.trim();
  if(!raw)return;
  const isProbablyUrl=/^https?:\/\//i.test(raw)||/^[\w-]+(\.[\w-]+)+/.test(raw);
  tab.title=raw;tab.error="";delete tab.results;
  if(isProbablyUrl){tab.url=normUrl(raw);saveState();renderAll();return}
  tab.loading=true;tab.url="https://duckduckgo.com/?q="+encodeURIComponent(raw);saveState();renderAll();
  try{const d=await apiFetch("/api/web/search?q="+encodeURIComponent(raw));tab.results=d.results||[];tab.title=raw;delete tab.loading;saveState();renderAll()}catch(e){delete tab.loading;tab.error=e.message;saveState();renderAll()}
}

function calcNum(){const n=Number(getCalc().display);return Number.isFinite(n)?n:0}
function calcFormat(n){if(!Number.isFinite(n))return"Error";const s=String(Math.round(n*1e10)/1e10);return s.length>14?Number(n).toExponential(8):s}
function calcApply(){const c=getCalc(),a=Number(c.stored),b=calcNum();if(c.operator==="+")return a+b;if(c.operator==="-")return a-b;if(c.operator==="*")return a*b;if(c.operator==="/")return b===0?NaN:a/b;return b}
function pressCalc(k){const c=getCalc();if(/^\d$/.test(k)){c.display=c.waiting?k:(c.display==="0"||c.display==="Error"?k:c.display+k);c.waiting=false}else if(k==="."){if(c.waiting){c.display="0.";c.waiting=false}else if(!c.display.includes("."))c.display+="."}else if(k==="AC"){Object.assign(c,{display:"0",stored:null,operator:null,waiting:false,history:""})}else if(k==="Back"){c.display=c.waiting?"0":(c.display.length>1?c.display.slice(0,-1):"0")}else if(k==="+/-"){if(c.display!=="0"&&c.display!=="Error")c.display=c.display.startsWith("-")?c.display.slice(1):"-"+c.display}else if(k==="%"){c.display=calcFormat(calcNum()/100)}else if(["+","-","*","/"].includes(k)){if(c.operator&&!c.waiting){const r=calcApply();c.display=calcFormat(r);c.stored=Number(c.display)}else c.stored=calcNum();c.operator=k;c.waiting=true;c.history=`${c.stored} ${k}`}else if(k==="="){if(c.operator){const old=`${c.stored} ${c.operator} ${c.display}`;const r=calcApply();c.display=calcFormat(r);c.history=`${old} =`;c.stored=null;c.operator=null;c.waiting=true}}saveStateQuiet();document.getElementById("calcDisplay")&&(document.getElementById("calcDisplay").textContent=c.display);const h=document.querySelector(".window.focused .calc-history");if(h)h.textContent=c.history||""}
function handleCalcKey(e){if(e.target.closest("input,textarea"))return;const focused=state.windows.find(w=>w.focused&&w.app==="calculator"&&!w.minimized);if(!focused)return;const map={Enter:"=",Backspace:"Back",Escape:"AC",x:"*",X:"*"};const k=map[e.key]||e.key;if(/^\d$/.test(k)||[".","+","-","*","/","=","Back","AC","%"].includes(k)){e.preventDefault();pressCalc(k)}}
function handleGameKeys(e){
  if(e.target.closest("input,textarea"))return;
  const focused=state.windows.find(w=>w.focused&&!w.minimized);
  if(!focused)return;
  const key=e.key;
  if(focused.app==="snake"){
    const dirs={ArrowUp:[0,-1],w:[0,-1],W:[0,-1],ArrowDown:[0,1],s:[0,1],S:[0,1],ArrowLeft:[-1,0],a:[-1,0],A:[-1,0],ArrowRight:[1,0],d:[1,0],D:[1,0]};
    if(key===" "){e.preventDefault();const g=getSnake();g.running=!g.running;g.status=g.running?"Running":"Paused";saveState();renderAll();return}
    if(dirs[key]){e.preventDefault();setSnakeDir(...dirs[key])}
  }
}
function logout(){saveState(true);token="";currentUser="";localStorage.removeItem(LS_TOKEN);localStorage.removeItem(LS_USER);switchScreen("lock")}
document.getElementById("desktop").addEventListener("click",()=>{toggleStart(false);toggleCalendar(false)});
document.addEventListener("keydown",e=>{if(screen==="lock"){e.preventDefault();resumeWallpaperVideo();revealLogin()}});
document.addEventListener("keydown",handleCalcKey);
document.addEventListener("keydown",handleGameKeys);
document.addEventListener("pointerdown",resumeWallpaperVideo,{passive:true});
document.addEventListener("visibilitychange",()=>{if(!document.hidden)resumeWallpaperVideo()});
window.addEventListener("beforeunload",()=>saveState(true));
window.addEventListener("resize",()=>{state.windows=sanitizeWindows(state.windows);saveState();renderAll()});
(async function boot(){const phoneTarget=new URLSearchParams(location.search).get("phoneCamera");if(phoneTarget){await renderPhoneCameraPortal(phoneTarget);return}applyTheme();tick();if(token&&currentUser){try{await apiFetch("/auth/me");await loadServerState();switchScreen("desktop")}catch{localStorage.removeItem(LS_TOKEN);token="";switchScreen("lock")}}else switchScreen("lock")})();
</script>
</body>
