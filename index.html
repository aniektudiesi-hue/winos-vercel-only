<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WinOS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#2563eb;
  --bg:#0b1220;
  --surface:rgba(243,246,255,.78);
  --surface-solid:#f3f6ff;
  --surface-dark:rgba(20,24,33,.86);
  --text:#101827;
  --text-inv:#f8fafc;
  --muted:#5d6678;
  --line:rgba(20,30,48,.16);
  --line-dark:rgba(255,255,255,.16);
  --shadow:0 24px 70px rgba(0,0,0,.28);
  --taskbar-h:48px;
  --radius:8px;
}
html,body{width:100%;height:100%;overflow:hidden;background:#07111f;color:var(--text);font-family:"Segoe UI Variable","Segoe UI",system-ui,sans-serif}
button,input,textarea,select{font:inherit}
button{border:0;background:transparent;color:inherit;cursor:pointer}
input,textarea,select{outline:0;color:inherit}
svg{display:block}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(80,90,110,.34);border:3px solid transparent;border-radius:999px;background-clip:padding-box}
.hidden{display:none!important}

.wallpaper{position:fixed;inset:0;overflow:hidden;background:
  radial-gradient(ellipse 70% 58% at 14% 30%,rgba(45,132,255,.9) 0%,rgba(33,111,225,.65) 30%,transparent 58%),
  radial-gradient(ellipse 72% 58% at 82% 76%,rgba(91,196,255,.82) 0%,rgba(45,135,220,.32) 31%,transparent 62%),
  radial-gradient(ellipse 64% 48% at 62% 8%,rgba(116,69,255,.35),transparent 62%),
  linear-gradient(135deg,#07111f 0%,#173a72 48%,#06101d 100%);background-size:cover;background-position:center;transition:filter .2s,background .35s}
.wallpaper:before{content:"";position:absolute;inset:-18%;opacity:0;pointer-events:none;transition:opacity .35s}
.wallpaper:after{content:"";position:absolute;inset:0;background:
  linear-gradient(180deg,rgba(255,255,255,.035),rgba(0,0,0,.17)),
  radial-gradient(circle at 50% 120%,rgba(255,255,255,.14),transparent 42%)}
.wallpaper.glass-aurora{background:linear-gradient(125deg,#0a1228 0%,#103b6d 34%,#5a6dd8 62%,#0d1835 100%)}
.wallpaper.glass-aurora:before{opacity:1;background:
  radial-gradient(ellipse 42% 36% at 18% 28%,rgba(116,211,255,.7),transparent 64%),
  radial-gradient(ellipse 48% 42% at 76% 22%,rgba(220,190,255,.62),transparent 66%),
  radial-gradient(ellipse 54% 50% at 54% 82%,rgba(45,255,190,.34),transparent 64%);
  filter:blur(20px) saturate(145%);animation:auroraDrift 18s ease-in-out infinite alternate}
.wallpaper.cosmic-flow{background:radial-gradient(circle at 28% 18%,#6d5dfc,transparent 26%),radial-gradient(circle at 72% 68%,#0cc7c7,transparent 24%),linear-gradient(135deg,#050713,#131730 58%,#03050d)}
.wallpaper.cosmic-flow:before{opacity:1;background-image:radial-gradient(circle,rgba(255,255,255,.9) 0 1px,transparent 1.4px),radial-gradient(circle,rgba(125,211,252,.6) 0 1px,transparent 1.5px);background-size:86px 86px,142px 142px;animation:starFloat 26s linear infinite}
.wallpaper.minimal-liquid{background:linear-gradient(135deg,#e9f4ff,#d6f4ef 42%,#f4e8ff)}
.wallpaper.minimal-liquid:before{opacity:1;background:radial-gradient(circle at 24% 40%,rgba(37,99,235,.34),transparent 30%),radial-gradient(circle at 78% 56%,rgba(16,185,129,.3),transparent 28%),radial-gradient(circle at 54% 18%,rgba(236,72,153,.24),transparent 24%);filter:blur(24px);animation:liquidShift 16s ease-in-out infinite alternate}
.wallpaper.midnight-calm{background:linear-gradient(135deg,#050816,#12172e 48%,#07111f)}
.wallpaper.midnight-calm:before{opacity:1;background:radial-gradient(ellipse at 50% 8%,rgba(59,130,246,.42),transparent 38%),radial-gradient(ellipse at 18% 76%,rgba(20,184,166,.18),transparent 36%);filter:blur(14px);animation:calmPulse 12s ease-in-out infinite alternate}
@keyframes auroraDrift{from{transform:translate3d(-4%,-2%,0) rotate(-5deg) scale(1.04)}to{transform:translate3d(5%,3%,0) rotate(7deg) scale(1.12)}}
@keyframes starFloat{from{transform:translate3d(0,0,0)}to{transform:translate3d(-72px,48px,0)}}
@keyframes liquidShift{from{transform:translate3d(-5%,1%,0) scale(1)}to{transform:translate3d(5%,-2%,0) scale(1.08)}}
@keyframes calmPulse{from{opacity:.78;transform:scale(1)}to{opacity:1;transform:scale(1.05)}}

.lock,.login{position:fixed;inset:0;z-index:9000;display:grid;place-items:center;color:#fff}
.lock{cursor:pointer}
.lock:before,.login:before{content:"";position:absolute;inset:0;background:rgba(3,8,16,.18);backdrop-filter:blur(1px)}
.lock-panel{position:relative;text-align:center;text-shadow:0 8px 28px rgba(0,0,0,.34)}
.lock-time{font-size:92px;line-height:1;font-weight:300;letter-spacing:-2px}
.lock-date{font-size:20px;margin-top:12px;font-weight:400}
.lock-hint{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);font-size:13px;color:rgba(255,255,255,.76)}
.login-box{position:relative;width:360px;max-width:calc(100vw - 40px);padding:30px 32px 26px;background:rgba(244,247,255,.18);border:1px solid rgba(255,255,255,.34);border-radius:10px;box-shadow:var(--shadow);backdrop-filter:blur(34px) saturate(150%)}
.login-avatar{width:76px;height:76px;margin:0 auto 16px;border-radius:50%;display:grid;place-items:center;background:rgba(255,255,255,.9);color:#1f2937;font-size:32px;font-weight:600}
.login-title{text-align:center;font-size:20px;font-weight:500;margin-bottom:16px}
.login-tabs{display:grid;grid-template-columns:1fr 1fr;margin-bottom:12px;background:rgba(255,255,255,.2);border-radius:7px;padding:3px}
.login-tab{height:32px;border-radius:5px;color:rgba(255,255,255,.78);font-size:13px}
.login-tab.active{background:rgba(255,255,255,.86);color:#111827}
.login-input{width:100%;height:40px;border:1px solid rgba(255,255,255,.42);background:rgba(255,255,255,.85);border-radius:4px;padding:0 11px;margin-bottom:9px;color:#111827}
.login-input:focus{border-color:#60a5fa;box-shadow:0 0 0 1px #60a5fa}
.login-actions{display:flex;gap:8px;margin-top:5px}
.login-btn{height:38px;flex:1;border-radius:4px;background:#2563eb;color:#fff;font-weight:500}
.login-btn.secondary{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.38)}
.login-error{height:18px;margin-top:10px;font-size:12px;color:#fee2e2}

.welcome{position:fixed;inset:0;z-index:9200;display:grid;place-items:center;color:#fff;pointer-events:none;opacity:1;transform:scale(1);transition:opacity .9s ease,transform .9s ease}
.welcome:before{content:"";position:absolute;inset:0;background:rgba(248,250,252,.08);backdrop-filter:blur(28px) saturate(170%);box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
.welcome:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.02) 44%,rgba(0,0,0,.14));mix-blend-mode:screen}
.welcome.welcome-out{opacity:0;transform:scale(1.035)}
.welcome-copy{position:relative;z-index:1;max-width:calc(100vw - 32px);padding:0 16px;text-align:center;text-shadow:0 22px 58px rgba(0,0,0,.34),0 2px 10px rgba(0,0,0,.26)}
.welcome-line{font-family:"Segoe Script","Snell Roundhand","Brush Script MT",cursive;font-size:clamp(50px,9vw,132px);font-weight:400;line-height:1.05;overflow-wrap:anywhere}
.welcome-cursor{display:inline-block;width:.08em;min-width:4px;height:.8em;margin-left:.09em;border-radius:999px;background:rgba(255,255,255,.92);vertical-align:-.08em;animation:welcomeBlink .85s steps(1,end) infinite;box-shadow:0 0 20px rgba(255,255,255,.56)}
@keyframes welcomeBlink{50%{opacity:0}}

.desktop{position:fixed;inset:0 0 var(--taskbar-h) 0;z-index:5;overflow:hidden;padding:12px}
.desktop-icons{display:flex;flex-direction:column;flex-wrap:wrap;gap:4px;height:100%;width:84px;align-content:flex-start}
.desk-icon{width:76px;height:78px;border:1px solid transparent;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.75)}
.desk-icon:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.24)}
.desk-icon .app-ico{width:34px;height:34px}
.desk-label{font-size:11px;line-height:1.2;text-align:center;max-width:72px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

.taskbar{position:fixed;left:0;right:0;bottom:0;height:var(--taskbar-h);z-index:5000;display:flex;align-items:center;justify-content:space-between;padding:0 10px;background:rgba(240,244,252,.76);border-top:1px solid rgba(255,255,255,.62);backdrop-filter:blur(34px) saturate(190%);box-shadow:0 -1px 24px rgba(8,15,30,.16)}
.tb-left,.tb-right,.tb-center{display:flex;align-items:center;gap:4px}
.tb-center{position:absolute;left:50%;transform:translateX(-50%);max-width:calc(100vw - 320px);overflow:hidden}
.tb-btn,.start-btn,.clock-zone{height:40px;border-radius:5px;display:grid;place-items:center;position:relative}
.tb-btn,.start-btn{width:44px}
.tb-btn,.start-btn{transition:transform .18s ease,background .18s ease,box-shadow .18s ease}
.tb-btn:hover,.start-btn:hover,.clock-zone:hover,.search-box:hover{background:rgba(255,255,255,.48);box-shadow:0 10px 26px rgba(15,23,42,.12)}
.tb-btn:hover,.start-btn:hover{transform:translateY(-4px) scale(1.06)}
.start-btn.open,.tb-btn.active{background:rgba(0,0,0,.09)}
.tb-btn.running:after,.tb-btn.active:after{content:"";position:absolute;bottom:2px;left:50%;transform:translateX(-50%);height:3px;border-radius:4px;background:#64748b}
.tb-btn.running:after{width:6px}
.tb-btn.active:after{width:18px;background:var(--accent)}
.tb-tip{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);white-space:nowrap;background:#20242d;color:#fff;border:1px solid rgba(255,255,255,.08);padding:5px 9px;border-radius:4px;font-size:11px;opacity:0;pointer-events:none;transition:.12s;box-shadow:0 8px 24px rgba(0,0,0,.28)}
.tb-btn:hover .tb-tip{opacity:1}
.search-box{height:34px;width:220px;border-radius:999px;background:rgba(255,255,255,.72);border:1px solid rgba(0,0,0,.06);display:flex;align-items:center;gap:8px;padding:0 12px;color:#4b5563;font-size:13px}
.tray{height:40px;border-radius:5px;display:flex;align-items:center;gap:8px;padding:0 8px;font-size:12px;color:#182033}
.battery-text{font-size:12px;min-width:34px;text-align:right;color:#172033}
.tray:hover{background:rgba(0,0,0,.07)}
.clock-zone{min-width:86px;align-items:end;justify-items:end;padding:0 7px;color:#172033}
.clock-time{font-size:12px;line-height:1.25}
.clock-date{font-size:11px;line-height:1.25}
.sync{width:8px;height:8px;border-radius:50%;background:#9ca3af;margin-right:4px}
.sync.synced{background:#22c55e}.sync.saving{background:#eab308}.sync.error{background:#ef4444}

.start-menu,.search-panel,.calendar-pop{position:fixed;z-index:6100;background:rgba(246,248,252,.92);border:1px solid rgba(255,255,255,.72);border-radius:8px;box-shadow:0 20px 55px rgba(0,0,0,.22);backdrop-filter:blur(30px) saturate(170%);color:#101827;opacity:0;pointer-events:none;transform:translateY(10px);transition:opacity .14s,transform .14s}
.start-menu.open,.search-panel.open,.calendar-pop.open{opacity:1;pointer-events:auto;transform:translateY(0)}
.start-menu{left:50%;bottom:58px;width:min(640px,calc(100vw - 24px));margin-left:-320px;padding:20px}
.start-search{height:36px;width:100%;border:1px solid #cbd5e1;border-radius:4px;background:#fff;padding:0 12px;margin-bottom:18px}
.start-sec{font-size:13px;font-weight:600;margin-bottom:10px}
.start-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.start-app{height:76px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px}
.start-app:hover{background:rgba(15,23,42,.07)}
.start-app .app-ico{width:30px;height:30px}
.start-app-name{font-size:11px;max-width:84px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.start-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(15,23,42,.1);margin-top:18px;padding-top:12px}
.user-chip{display:flex;align-items:center;gap:10px;font-size:13px}
.avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;background:#dbeafe;color:#1e3a8a;font-weight:600}
.power-btn{width:34px;height:34px;border-radius:5px}
.power-btn:hover{background:rgba(239,68,68,.13);color:#dc2626}
.calendar-pop{right:10px;bottom:58px;width:330px;padding:14px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-title{font-weight:600}
.cal-nav button{width:28px;height:28px;border-radius:4px}
.cal-nav button:hover{background:rgba(15,23,42,.08)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{height:28px;display:grid;place-items:center;font-size:11px;color:#64748b}
.cal-day{height:34px;border-radius:50%;display:grid;place-items:center;font-size:12px}
.cal-day:hover{background:rgba(15,23,42,.08)}
.cal-day.today{background:var(--accent);color:#fff;font-weight:600}
.cal-day.has{box-shadow:0 0 0 1px var(--accent) inset}

.window{position:fixed;z-index:20;min-width:286px;min-height:170px;background:rgba(249,250,252,.86);border:1px solid rgba(255,255,255,.66);border-radius:10px;box-shadow:0 26px 80px rgba(6,10,24,.28);overflow:hidden;display:flex;flex-direction:column;color:#101827;backdrop-filter:blur(24px) saturate(160%);animation:winIn .2s cubic-bezier(.2,.8,.2,1)}
.window.focused{box-shadow:0 34px 100px rgba(0,0,0,.34);border-color:rgba(255,255,255,.82);transform:translateY(-1px)}
.window.maximized{border-radius:0;border-left:0;border-right:0;border-top:0;animation:none}
.titlebar{height:34px;display:flex;align-items:center;gap:8px;padding:0 0 0 10px;background:rgba(255,255,255,.58);border-bottom:1px solid rgba(255,255,255,.62);user-select:none;backdrop-filter:blur(18px)}
@keyframes winIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
.titlebar.drag{cursor:move}
.win-ico{width:16px;height:16px;flex:0 0 auto}
.win-title{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.win-controls{display:flex;height:32px}
.win-control{width:46px;height:32px;border-radius:0;display:grid;place-items:center;color:#111827}
.win-control:hover{background:rgba(0,0,0,.08)}
.win-control.close:hover{background:#c42b1c;color:#fff}
.win-body{flex:1;min-height:0;overflow:hidden;background:#fff}
.resize-handle{position:absolute;z-index:3;background:transparent}
.resize-handle.e{top:12px;right:0;width:8px;bottom:12px;cursor:ew-resize}
.resize-handle.w{top:12px;left:0;width:8px;bottom:12px;cursor:ew-resize}
.resize-handle.n{top:0;left:12px;right:12px;height:8px;cursor:ns-resize}
.resize-handle.s{bottom:0;left:12px;right:12px;height:8px;cursor:ns-resize}
.resize-handle.ne,.resize-handle.nw,.resize-handle.se,.resize-handle.sw{width:16px;height:16px}
.resize-handle.ne{top:0;right:0;cursor:nesw-resize}.resize-handle.nw{top:0;left:0;cursor:nwse-resize}.resize-handle.se{right:0;bottom:0;cursor:nwse-resize}.resize-handle.sw{left:0;bottom:0;cursor:nesw-resize}
.resize-handle.se:after{content:"";position:absolute;right:4px;bottom:4px;width:8px;height:8px;border-right:2px solid rgba(15,23,42,.28);border-bottom:2px solid rgba(15,23,42,.28);border-radius:1px}

.app-shell{height:100%;display:flex;flex-direction:column;background:#fff}
.toolbar{min-height:42px;display:flex;align-items:center;gap:7px;padding:6px 8px;border-bottom:1px solid #e5e7eb;background:#f8fafc}
.tool-input{height:30px;border:1px solid #cbd5e1;border-radius:4px;background:#fff;padding:0 9px;font-size:13px}
.tool-btn{height:30px;border-radius:4px;background:#e9edf5;border:1px solid #d8dee9;padding:0 10px;font-size:12px;font-weight:500}
.tool-btn:hover{background:#dde5f0}
.tool-btn.primary{background:#2563eb;border-color:#2563eb;color:#fff}
.tool-btn.danger{background:#fee2e2;border-color:#fecaca;color:#991b1b}
.split{display:flex;min-height:0;flex:1}
.sidebar{width:184px;flex:0 0 auto;background:#f3f6fb;border-right:1px solid #e5e7eb;padding:8px;overflow:auto}
.side-item{height:32px;width:100%;border-radius:4px;display:flex;align-items:center;gap:8px;padding:0 9px;text-align:left;font-size:13px;color:#253044}
.side-item:hover,.side-item.active{background:#e3eaf5}
.main-pane{flex:1;min-width:0;overflow:auto;padding:12px}
.pathbar{height:32px;display:flex;align-items:center;border:1px solid #d8dee9;background:#fff;border-radius:4px;padding:0 10px;font-size:13px;color:#475569;margin-bottom:10px}
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px}
.file-card{height:92px;border:1px solid transparent;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:relative}
.file-card:hover{background:#eef4ff;border-color:#d8e7ff}
.file-card .app-ico{width:34px;height:34px}
.file-name{font-size:11px;max-width:86px;text-align:center;line-height:1.2;word-break:break-word}
.empty{padding:28px;text-align:center;color:#64748b;font-size:13px}

.notepad{height:100%;display:flex;flex-direction:column;background:#fff}
.note-bar{height:38px;display:flex;align-items:center;gap:8px;padding:5px 8px;border-bottom:1px solid #e5e7eb;background:#f8fafc}
.note-title{flex:1;height:28px;border:0;background:transparent;font-size:13px}
.note-stat{font-size:11px;color:#64748b;white-space:nowrap}
.note-area{flex:1;resize:none;border:0;padding:14px 16px;font:14px/1.65 Consolas,"Cascadia Mono",monospace;background:#fff;color:#111827}

.chrome{height:100%;display:flex;flex-direction:column;background:#f1f3f4}
.chrome-tabs{height:36px;display:flex;align-items:end;gap:2px;padding:6px 8px 0;background:#dee1e6}
.chrome-tab{height:30px;min-width:168px;max-width:220px;border-radius:8px 8px 0 0;background:#cfd4dc;display:flex;align-items:center;gap:7px;padding:0 10px;font-size:12px}
.chrome-tab.active{background:#fff}
.chrome-tab-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:left}
.chrome-plus{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;margin-bottom:2px}
.chrome-plus:hover,.chrome-icon-btn:hover{background:rgba(0,0,0,.08)}
.chrome-toolbar{height:42px;display:flex;align-items:center;gap:6px;padding:6px 8px;background:#fff;border-bottom:1px solid #d7dce5}
.chrome-icon-btn{width:30px;height:30px;border-radius:50%;display:grid;place-items:center}
.omnibox{flex:1;height:30px;border:0;border-radius:999px;background:#eef2f7;padding:0 13px;font-size:13px;color:#111827}
.browser-view{flex:1;position:relative;background:#fff}
.browser-view iframe{width:100%;height:100%;border:0;background:#fff}
.browser-note{position:absolute;right:10px;bottom:10px;background:rgba(255,255,255,.94);border:1px solid #d8dee9;border-radius:6px;padding:8px 10px;font-size:11px;color:#475569;box-shadow:0 10px 30px rgba(0,0,0,.14);max-width:270px}
.browser-start{height:100%;display:grid;place-items:center;padding:28px;color:#475569;text-align:center}
.browser-start h3{font-size:30px;font-weight:400;color:#111827;margin-bottom:8px}
.browser-open{position:absolute;left:10px;bottom:10px;background:rgba(255,255,255,.94);border:1px solid #d8dee9;border-radius:6px;padding:8px 10px;font-size:11px;color:#475569;box-shadow:0 10px 30px rgba(0,0,0,.14)}

.results{display:flex;flex-direction:column;gap:8px}
.result{display:flex;gap:10px;border:1px solid #e5e7eb;border-radius:6px;background:#fff;padding:10px;text-align:left}
.result:hover{background:#f8fafc}
.result-title{font-size:14px;font-weight:600;color:#0f172a}
.result-url{font-size:11px;color:#2563eb;margin-top:2px;word-break:break-all}
.result-text{font-size:12px;color:#64748b;line-height:1.4;margin-top:5px}
.thumb{width:128px;height:72px;object-fit:cover;border-radius:4px;background:#e5e7eb;flex:0 0 auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
.card{border:1px solid #e5e7eb;border-radius:6px;background:#fff;padding:12px}
.card-label{font-size:12px;color:#64748b;margin-bottom:6px}
.big{font-size:28px;font-weight:300}
.todo-row,.event-row{display:flex;align-items:center;gap:8px;border:1px solid #e5e7eb;background:#fff;border-radius:5px;padding:8px;margin-bottom:7px}
.todo-row.done .todo-text{text-decoration:line-through;color:#64748b}
.check{width:17px;height:17px;border:1px solid #94a3b8;border-radius:3px;display:grid;place-items:center;font-size:12px}
.todo-row.done .check{background:#2563eb;color:#fff;border-color:#2563eb}
.calc{height:100%;display:flex;flex-direction:column;gap:10px;padding:14px;background:linear-gradient(180deg,#f8fbff,#edf3fb)}
.calc-screen{min-height:116px;border:1px solid rgba(148,163,184,.32);border-radius:10px;background:rgba(255,255,255,.9);display:flex;flex-direction:column;justify-content:end;align-items:end;padding:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.8)}
.calc-history{min-height:22px;color:#64748b;font-size:13px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.calc-display{max-width:100%;font-size:38px;font-weight:300;line-height:1.15;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;flex:1}
.calc-key{border-radius:8px;background:rgba(255,255,255,.9);border:1px solid rgba(203,213,225,.9);font-size:17px;box-shadow:0 8px 20px rgba(15,23,42,.06);transition:transform .12s,background .12s}
.calc-key:hover{background:#fff;transform:translateY(-1px)}
.calc-key.op{background:#e0ecff;color:#1d4ed8}
.calc-key.eq{background:#2563eb;color:#fff}
.calc-key.utility{background:#eef2f7;color:#334155}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:12px 0;border-bottom:1px solid #e5e7eb}
.muted{color:#64748b;font-size:12px;margin-top:2px}
.swatches{display:flex;gap:8px;flex-wrap:wrap;justify-content:end}
.swatch{width:28px;height:28px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #cbd5e1}
.swatch.active{box-shadow:0 0 0 2px #111827}
.wall-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:10px;min-width:280px}
.wall-thumb{height:66px;border-radius:6px;border:2px solid transparent;background-size:cover;background-position:center;box-shadow:0 0 0 1px #cbd5e1 inset;overflow:hidden;position:relative}
.wall-thumb.active{border-color:#111827}
.wall-thumb span{position:absolute;left:7px;bottom:6px;color:#fff;font-size:11px;text-shadow:0 1px 4px rgba(0,0,0,.8)}
.game-board{display:grid;gap:10px;margin:12px auto;max-width:360px}
.ttt-board{grid-template-columns:repeat(3,1fr);aspect-ratio:1}
.ttt-cell{border-radius:10px;background:rgba(255,255,255,.86);border:1px solid #dbe3ef;font-size:48px;font-weight:700;color:#1d4ed8;box-shadow:0 10px 28px rgba(15,23,42,.08);transition:transform .12s,background .12s}
.ttt-cell:hover{transform:translateY(-2px);background:#fff}
.ttt-cell.matched{background:#dcfce7;color:#15803d;box-shadow:0 0 0 2px rgba(34,197,94,.32) inset}
.game-stats{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin:0 0 10px;color:#475569;font-size:13px}
.segmented{display:flex;background:#e9eef7;border-radius:8px;padding:3px;gap:3px}
.segmented button{height:30px;border-radius:6px;padding:0 10px;font-size:12px}
.segmented button.active{background:#fff;box-shadow:0 6px 16px rgba(15,23,42,.1)}
.memory-board{grid-template-columns:repeat(4,1fr);max-width:430px}
.memory-card{height:76px;border-radius:10px;border:1px solid #dbe3ef;background:linear-gradient(135deg,#dbeafe,#f5f3ff);color:#1e293b;font-size:28px;font-weight:700;box-shadow:0 10px 26px rgba(15,23,42,.08);transform-style:preserve-3d;transition:transform .18s,background .18s}
.memory-card.flipped,.memory-card.matched{background:#fff;transform:rotateY(180deg)}
.memory-card.matched{color:#16a34a;box-shadow:0 0 0 2px rgba(34,197,94,.26) inset}
.camera-shell{height:100%;display:grid;grid-template-columns:minmax(0,1fr) 280px;background:#0b1020;color:#f8fafc}
.camera-stage{position:relative;display:grid;place-items:center;background:radial-gradient(circle at 50% 20%,rgba(37,99,235,.22),transparent 35%),#030712;overflow:hidden}
.camera-video{max-width:100%;max-height:100%;background:#000;border-radius:8px;box-shadow:0 20px 70px rgba(0,0,0,.45)}
.camera-video.mirror{transform:scaleX(-1)}
.camera-side{border-left:1px solid rgba(255,255,255,.12);background:rgba(15,23,42,.88);padding:14px;overflow:auto}
.camera-status{font-size:12px;color:#cbd5e1;line-height:1.45;margin:8px 0 12px}
.camera-shot{width:100%;border-radius:8px;border:1px solid rgba(255,255,255,.16);margin-top:10px;background:#111827}
.qr-box{display:grid;place-items:center;background:#fff;border-radius:8px;padding:10px;margin:10px 0}
.qr-box img{width:160px;height:160px}
.phone-portal{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(135deg,#050816,#173a72);color:#fff;font-family:"Segoe UI",system-ui,sans-serif}
.phone-card{width:min(430px,100%);background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.28);border-radius:12px;padding:22px;backdrop-filter:blur(24px);box-shadow:0 24px 70px rgba(0,0,0,.34)}
.phone-card video{width:100%;border-radius:8px;background:#000;margin:12px 0}
@media (prefers-reduced-motion:reduce){.wallpaper:before,.window,.tb-btn,.start-btn,.memory-card{animation:none!important;transition:none!important}}

@media(max-width:760px){
  .search-box{display:none}

  .tb-center{left:8px;right:108px;transform:none;max-width:none}
  .start-menu{left:8px;right:8px;margin-left:0;width:auto}
  .start-grid{grid-template-columns:repeat(4,1fr)}
  .sidebar{width:132px}
}

function jsonStore(key,fallback){try{return JSON.parse(localStorage.getItem(key)||JSON.stringify(fallback))}catch{return fallback}}
function saveJsonStore(key,value){localStorage.setItem(key,JSON.stringify(value))}
async function localHash(text){
  const data=new TextEncoder().encode(text);
  const hash=await crypto.subtle.digest("SHA-256",data);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
function localToken(){return"winos_"+Math.random().toString(36).slice(2)+Date.now().toString(36)}
function localJson(data,status=200){return new Response(JSON.stringify(data),{status,headers:{"Content-Type":"application/json"}})}
function localAuthHeader(opts={}){
  const h=opts.headers||{};
  if(h instanceof Headers)return h.get("Authorization")||"";
  return h.Authorization||h.authorization||"";
}
function localUserFromAuth(opts={}){
  const raw=localAuthHeader(opts).replace(/^Bearer\s+/i,"").trim();
  if(!raw)return null;
  const accounts=jsonStore(LS_ACCOUNTS,{});
  return Object.entries(accounts).find(([,a])=>a.token===raw)?.[0]||null;
}
async function localApi(path,opts={}){
  const url=new URL(path,location.origin),method=(opts.method||"GET").toUpperCase();
  const body=opts.body?JSON.parse(opts.body):{};
  if(url.pathname==="/auth/register"&&method==="POST"){
    const username=String(body.username||"").trim(),password=String(body.password||"").trim();
    if(username.length<3)return localJson({detail:"Username must be at least 3 characters"},400);
    if(password.length<4)return localJson({detail:"Password must be at least 4 characters"},400);
    const accounts=jsonStore(LS_ACCOUNTS,{});
    if(accounts[username])return localJson({detail:"Username already taken"},409);
    accounts[username]={passwordHash:await localHash(password),token:localToken()};
    saveJsonStore(LS_ACCOUNTS,accounts);
    return localJson({token:accounts[username].token,username});
  }
  if(url.pathname==="/auth/login"&&method==="POST"){
    const username=String(body.username||"").trim(),password=String(body.password||"").trim(),accounts=jsonStore(LS_ACCOUNTS,{});
    if(!accounts[username]||accounts[username].passwordHash!==await localHash(password))return localJson({detail:"Wrong username or password"},401);
    return localJson({token:accounts[username].token,username});
  }
  if(url.pathname==="/auth/me"){
    const username=localUserFromAuth(opts);
    return username?localJson({id:username,username}):localJson({detail:"Invalid or expired token"},401);
  }
  if(url.pathname==="/desktop/state"){
    const username=localUserFromAuth(opts);
    if(!username)return localJson({detail:"Not authenticated"},401);
    const states=jsonStore(LS_SERVER_STATES,{});
    if(method==="GET")return localJson({state:states[username]||{},is_default:!states[username],updated_at:null});
    states[username]=body.state||body||{};
    saveJsonStore(LS_SERVER_STATES,states);
    return localJson({ok:true,bytes:JSON.stringify(states[username]).length});
  }
  return null;
}
const nativeFetch=window.fetch.bind(window);
window.fetch=async(input,opts={})=>{
  const url=typeof input==="string"?input:input.url,parsed=new URL(url,location.href);
  if(parsed.origin===location.origin){
    const handled=await localApi(parsed.pathname+parsed.search,opts);
    if(handled)return handled;
  }
  return nativeFetch(input,opts);
};

function getCalc(){state.calc={display:"0",stored:null,operator:null,waiting:false,history:"",...(state.calc||{})};return state.calc}
function getTtt(){const base={board:Array(9).fill(""),turn:"X",mode:"ai",status:"Your move",scores:{x:0,o:0,draw:0}};state.games=state.games||{};state.games.ttt={...base,...(state.games.ttt||{}),scores:{...base.scores,...((state.games.ttt&&state.games.ttt.scores)||{})}};return state.games.ttt}
function resetTtt(keepScores=true){const old=getTtt();state.games.ttt={board:Array(9).fill(""),turn:"X",mode:old.mode,status:"Your move",scores:keepScores?old.scores:{x:0,o:0,draw:0}};saveState();renderAll()}
function winningLine(board){return[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].find(line=>line.every(i=>board[i]&&board[i]===board[line[0]]))}
function finishTttIfNeeded(g){const win=winningLine(g.board);if(win){const who=g.board[win[0]];g.status=`${who} wins`;g.scores[who.toLowerCase()]++;return true}if(g.board.every(Boolean)){g.status="Draw";g.scores.draw++;return true}return false}
function bestTttMove(board){const lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]],pick=mark=>{for(const l of lines){const vals=l.map(i=>board[i]);if(vals.filter(v=>v===mark).length===2&&vals.includes(""))return l[vals.indexOf("")]}return null};return pick("O")??pick("X")??[4,0,2,6,8,1,3,5,7].find(i=>!board[i])}
function playTtt(i){const g=getTtt();if(g.board[i]||winningLine(g.board)||g.board.every(Boolean))return;g.board[i]=g.turn;if(finishTttIfNeeded(g)){saveState();renderAll();return}if(g.mode==="ai"&&g.turn==="X"){g.turn="O";const ai=bestTttMove(g.board);if(ai!=null)g.board[ai]="O";finishTttIfNeeded(g);g.turn="X";if(!winningLine(g.board)&&!g.board.every(Boolean))g.status="Your move"}else{g.turn=g.turn==="X"?"O":"X";g.status=`${g.turn}'s turn`}saveState();renderAll()}
function newMemoryDeck(){const faces=["A","B","C","D","E","F","G","H"],deck=[...faces,...faces].sort(()=>Math.random()-.5);return{cards:deck,flipped:[],matched:[],moves:0,startedAt:Date.now(),elapsed:0,done:false}}
function getMemory(){state.games=state.games||{};if(!state.games.memory)state.games.memory=newMemoryDeck();return state.games.memory}
function resetMemory(){state.games.memory=newMemoryDeck();saveState();renderAll()}
function playMemory(i){const g=getMemory();if(g.done||g.matched.includes(i)||g.flipped.includes(i))return;if(g.flipped.length===2){const[a,b]=g.flipped;if(g.cards[a]!==g.cards[b])g.flipped=[]}g.flipped.push(i);if(g.flipped.length===2){g.moves++;const[a,b]=g.flipped;if(g.cards[a]===g.cards[b]){g.matched.push(a,b);g.flipped=[];if(g.matched.length===g.cards.length){g.done=true;g.elapsed=Math.floor((Date.now()-g.startedAt)/1000)}}}saveState();renderAll()}
function loadPeer(){return new Promise((resolve,reject)=>{if(window.Peer)return resolve(window.Peer);const s=document.createElement("script");s.src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js";s.onload=()=>resolve(window.Peer);s.onerror=()=>reject(new Error("Could not load phone camera bridge."));document.head.appendChild(s)})}
function attachCameraStreams(){const v=document.getElementById("cameraVideo");if(!v)return;const stream=phoneStream||cameraStream;if(stream&&v.srcObject!==stream)v.srcObject=stream}
async function startLocalCamera(){try{cameraStream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});state.camera.status="Local camera connected.";saveState();renderAll()}catch(e){state.camera.status=e.message||"Camera permission denied.";saveState();renderAll()}}
async function startPhoneCamera(){try{const Peer=await loadPeer();if(cameraPeer)cameraPeer.destroy();cameraPeer=new Peer();state.camera.status="Preparing phone camera link...";saveState();renderAll();cameraPeer.on("open",id=>{cameraPeerId=id;state.camera.phoneUrl=`${location.origin}${location.pathname}?phoneCamera=${encodeURIComponent(id)}`;state.camera.status="Scan the QR code with your phone.";saveState();renderAll()});cameraPeer.on("call",call=>{call.answer();call.on("stream",stream=>{phoneStream=stream;state.camera.status="Phone camera connected.";saveState();renderAll()})});cameraPeer.on("error",err=>{state.camera.status=err.message||"Phone camera bridge failed.";saveState();renderAll()})}catch(e){state.camera.status=e.message;saveState();renderAll()}}
function captureCamera(){const v=document.getElementById("cameraVideo");if(!v||!v.videoWidth){state.camera.status="No camera frame available yet.";saveState();renderAll();return}const canvas=document.createElement("canvas");canvas.width=v.videoWidth;canvas.height=v.videoHeight;const ctx=canvas.getContext("2d");if(state.camera.mirror){ctx.translate(canvas.width,0);ctx.scale(-1,1)}ctx.drawImage(v,0,0);state.camera.photo=canvas.toDataURL("image/png");state.camera.status="Snapshot captured.";saveState();renderAll()}
async function renderPhoneCameraPortal(targetId){document.body.innerHTML=`<main class="phone-portal"><section class="phone-card"><h1>WinOS Phone Camera</h1><p id="phoneStatus">Allow camera access to stream to WinOS.</p><video id="phoneVideo" autoplay playsinline muted></video><button class="login-btn" id="phoneStart">Start Phone Camera</button></section></main>`;document.getElementById("phoneStart").addEventListener("click",async()=>{const status=document.getElementById("phoneStatus");try{const Peer=await loadPeer(),stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});document.getElementById("phoneVideo").srcObject=stream;const peer=new Peer();peer.on("open",()=>{peer.call(targetId,stream);status.textContent="Streaming to WinOS. Keep this page open."});peer.on("error",e=>status.textContent=e.message||"Connection failed.")}catch(e){status.textContent=e.message||"Camera failed."}})}

  root.querySelector("[data-memory-reset]")?.addEventListener("click",resetMemory);
  root.querySelector("[data-camera-local]")?.addEventListener("click",startLocalCamera);
  root.querySelector("[data-camera-phone]")?.addEventListener("click",startPhoneCamera);
  root.querySelector("[data-camera-mirror]")?.addEventListener("click",()=>{state.camera.mirror=!state.camera.mirror;saveState();renderAll()});
  root.querySelector("[data-camera-shot]")?.addEventListener("click",captureCamera);
  root.querySelectorAll("[data-accent]").forEach(b=>b.addEventListener("click",()=>{state.accent=b.dataset.accent;saveState();renderAll()}));
  root.querySelectorAll("[data-wallpaper]").forEach(b=>b.addEventListener("click",()=>{state.wallpaper=b.dataset.wallpaper;saveState();renderAll()}));
  root.querySelector("[data-force-sync]")?.addEventListener("click",()=>saveState(true));
  root.querySelector("[data-reset]")?.addEventListener("click",()=>{if(confirm("Reset WinOS state?")){state=defaultState();saveState(true);renderAll()}});
}
async function goChromium(id,root){
  const w=state.windows.find(x=>x.id===id),tab=tabDefaults(w),input=root.querySelector(`[data-url="${id}"]`),raw=input.value.trim();
  if(!raw)return;
  const isProbablyUrl=/^https?:\/\//i.test(raw)||/^[\w-]+(\.[\w-]+)+/.test(raw);
  tab.title=raw;tab.error="";delete tab.results;
  if(isProbablyUrl){tab.url=normUrl(raw);saveState();renderAll();return}
  tab.loading=true;tab.url="https://duckduckgo.com/?q="+encodeURIComponent(raw);saveState();renderAll();
  try{const d=await apiFetch("/api/web/search?q="+encodeURIComponent(raw));tab.results=d.results||[];tab.title=raw;delete tab.loading;saveState();renderAll()}catch(e){delete tab.loading;tab.error=e.message;saveState();renderAll()}
}
function moveCal(id,delta){const w=state.windows.find(x=>x.id===id),d=new Date(w.data.year||new Date().getFullYear(),w.data.month??new Date().getMonth(),1);d.setMonth(d.getMonth()+delta);w.data.year=d.getFullYear();w.data.month=d.getMonth();saveState();renderAll()}
async function runGoogle(id,root){const w=state.windows.find(x=>x.id===id),q=root.querySelector(`[data-google-q="${id}"]`).value.trim(),out=document.getElementById("google_"+id);if(!q)return;out.innerHTML='<div class="empty">Searching...</div>';try{const d=await apiFetch("/api/web/search?q="+encodeURIComponent(q));w.data.query=q;w.data.results=d.results||[];saveState();renderAll()}catch(e){out.innerHTML=`<div class="empty">${escapeHtml(e.message)}</div>`}}
async function runYoutube(id,root){const w=state.windows.find(x=>x.id===id),q=root.querySelector(`[data-yt-q="${id}"]`).value.trim(),out=document.getElementById("yt_"+id);if(!q)return;out.innerHTML='<div class="empty">Searching...</div>';try{const d=await apiFetch("/api/youtube/search?q="+encodeURIComponent(q));w.data.query=q;w.data.results=d.results||[];saveState();renderAll()}catch(e){out.innerHTML=`<div class="empty">${escapeHtml(e.message)}</div>`}}
async function runWeather(id){const city=document.getElementById("city_"+id).value.trim()||"Delhi",out=document.getElementById("api_"+id);out.innerHTML='<div class="card">Loading...</div>';try{const w=await apiFetch("/api/weather?city="+encodeURIComponent(city));out.innerHTML=`<div class="card"><div class="card-label">${escapeHtml(w.city)}, ${escapeHtml(w.country)}</div><div class="big">${escapeHtml(w.temp_c)} C</div><div>${escapeHtml(w.description)}. Feels ${escapeHtml(w.feels_c)} C</div></div><div class="card"><div class="card-label">Humidity</div><div class="big">${escapeHtml(w.humidity)}%</div></div><div class="card"><div class="card-label">Wind</div><div class="big">${escapeHtml(w.wind_kmph)}</div><div>km/h</div></div>`}catch(e){out.innerHTML=`<div class="card">${escapeHtml(e.message)}</div>`}}
async function runSystem(id){const out=document.getElementById("api_"+id);try{const s=await apiFetch("/api/os/system");out.innerHTML=`<div class="card"><div class="card-label">Status</div><div class="big">${escapeHtml(s.status)}</div><div>${escapeHtml(s.app)}</div></div><div class="card"><div class="card-label">Database</div><div class="big">${escapeHtml(s.db)}</div></div><div class="card"><div class="card-label">Features</div><div>${(s.features||[]).map(escapeHtml).join("<br>")}</div></div>`}catch(e){out.innerHTML=`<div class="card">${escapeHtml(e.message)}</div>`}}
function addTodo(root){const i=root.querySelector("[data-todo-input]");if(!i.value.trim())return;state.todos.unshift({id:uid("todo"),text:i.value.trim(),done:false,createdAt:Date.now()});saveState();renderAll()}
function calcNum(){const n=Number(getCalc().display);return Number.isFinite(n)?n:0}
function calcFormat(n){if(!Number.isFinite(n))return"Error";const s=String(Math.round(n*1e10)/1e10);return s.length>14?Number(n).toExponential(8):s}
function calcApply(){const c=getCalc(),a=Number(c.stored),b=calcNum();if(c.operator==="+")return a+b;if(c.operator==="-")return a-b;if(c.operator==="*")return a*b;if(c.operator==="/")return b===0?NaN:a/b;return b}
function pressCalc(k){const c=getCalc();if(/^\d$/.test(k)){c.display=c.waiting?k:(c.display==="0"||c.display==="Error"?k:c.display+k);c.waiting=false}else if(k==="."){if(c.waiting){c.display="0.";c.waiting=false}else if(!c.display.includes("."))c.display+="."}else if(k==="AC"){Object.assign(c,{display:"0",stored:null,operator:null,waiting:false,history:""})}else if(k==="Back"){c.display=c.waiting?"0":(c.display.length>1?c.display.slice(0,-1):"0")}else if(k==="+/-"){if(c.display!=="0"&&c.display!=="Error")c.display=c.display.startsWith("-")?c.display.slice(1):"-"+c.display}else if(k==="%"){c.display=calcFormat(calcNum()/100)}else if(["+","-","*","/"].includes(k)){if(c.operator&&!c.waiting){const r=calcApply();c.display=calcFormat(r);c.stored=Number(c.display)}else c.stored=calcNum();c.operator=k;c.waiting=true;c.history=`${c.stored} ${k}`}else if(k==="="){if(c.operator){const old=`${c.stored} ${c.operator} ${c.display}`;const r=calcApply();c.display=calcFormat(r);c.history=`${old} =`;c.stored=null;c.operator=null;c.waiting=true}}saveState();renderAll()}
function handleCalcKey(e){if(e.target.closest("input,textarea"))return;const focused=state.windows.find(w=>w.focused&&w.app==="calculator"&&!w.minimized);if(!focused)return;const map={Enter:"=",Backspace:"Back",Escape:"AC",x:"*",X:"*"};const k=map[e.key]||e.key;if(/^\d$/.test(k)||[".","+","-","*","/","=","Back","AC","%"].includes(k)){e.preventDefault();pressCalc(k)}}
function logout(){saveState(true);token="";currentUser="";localStorage.removeItem(LS_TOKEN);localStorage.removeItem(LS_USER);switchScreen("lock")}
document.getElementById("desktop").addEventListener("click",()=>{toggleStart(false);toggleCalendar(false)});
document.addEventListener("keydown",handleCalcKey);
window.addEventListener("beforeunload",()=>saveState(true));
window.addEventListener("resize",()=>{state.windows=sanitizeWindows(state.windows);saveState();renderAll()});
(async function boot(){const phoneTarget=new URLSearchParams(location.search).get("phoneCamera");if(phoneTarget){await renderPhoneCameraPortal(phoneTarget);return}applyTheme();tick();if(token&&currentUser){try{await apiFetch("/auth/me");await loadServerState();switchScreen("desktop")}catch{localStorage.removeItem(LS_TOKEN);token="";switchScreen("lock")}}else switchScreen("lock")})();
</script>
